<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}PriorityAI{% endblock %}</title>
    <meta name="description" content="PriorityAI — Intelligent complaint prioritization powered by fine-tuned BERT. Instantly rank customer issues by urgency and priority across any industry." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fc;
            --bg2: #ffffff;
            --bg3: #f1f3f9;
            --border: rgba(30, 40, 80, 0.09);
            --border-strong: rgba(30, 40, 80, 0.16);
            --accent: #4361ee;
            --accent-light: #eef0fd;
            --accent2: #f72585;
            --accent3: #06d6a0;
            --text: #111827;
            --text2: #374151;
            --muted: #6b7280;
            --muted2: #9ca3af;
            --high: #ef4444;
            --high-bg: #fef2f2;
            --medium: #f59e0b;
            --medium-bg: #fffbeb;
            --low: #10b981;
            --low-bg: #ecfdf5;
            --card: #ffffff;
            --card-hover: #f8f9fc;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 4px 16px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
            --radius: 14px;
            --font-head: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── NAV ─────────────────────────────────────────────── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: 64px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            animation: navSlide 0.5s ease;
        }

        @keyframes navSlide {
            from { transform: translateY(-100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .nav-logo {
            font-family: var(--font-head);
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-logo .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 800;
        }

        .nav-logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 4px;
            list-style: none;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: 8px;
            transition: all 0.18s;
        }

        .nav-links a:hover {
            color: var(--text);
            background: var(--bg3);
        }

        .nav-links a.active {
            color: var(--accent);
            background: var(--accent-light);
            font-weight: 600;
        }

        /* ── MAIN CONTENT ────────────────────────────────────── */
        main {
            position: relative;
            z-index: 1;
            padding-top: 64px;
        }

        /* ── REUSABLE COMPONENTS ─────────────────────────────── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .section {
            padding: 80px 0;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .card:hover {
            box-shadow: var(--shadow);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 100px;
        }

        .badge-high {
            background: var(--high-bg);
            color: var(--high);
        }

        .badge-medium {
            background: var(--medium-bg);
            color: var(--medium);
        }

        .badge-low {
            background: var(--low-bg);
            color: var(--low);
        }

        .badge-accent {
            background: var(--accent-light);
            color: var(--accent);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 22px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
            letter-spacing: -0.1px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(67, 97, 238, 0.25);
        }

        .btn-primary:hover {
            background: #3451d1;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.35);
        }

        .btn-outline {
            background: transparent;
            color: var(--text2);
            border: 1.5px solid var(--border-strong);
        }

        .btn-outline:hover {
            background: var(--bg3);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-danger {
            background: var(--high-bg);
            color: var(--high);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: #fee2e2;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ── FORM ELEMENTS ───────────────────────────────────── */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text2);
            margin-bottom: 7px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            background: var(--bg);
            border: 1.5px solid var(--border-strong);
            border-radius: 10px;
            padding: 11px 14px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.12);
            background: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        select option {
            background: var(--bg2);
        }

        /* ── URGENCY BAR ─────────────────────────────────────── */
        .urgency-bar {
            height: 6px;
            background: var(--bg3);
            border-radius: 100px;
            overflow: hidden;
        }

        .urgency-fill {
            height: 100%;
            border-radius: 100px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, var(--accent3), var(--medium), var(--high));
        }

        /* ── RESULT CARD ─────────────────────────────────────── */
        .result-card {
            border-radius: var(--radius);
            padding: 28px;
            border: 1px solid var(--border);
            background: var(--bg2);
            box-shadow: var(--shadow);
            animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .result-high {
            border-color: rgba(239, 68, 68, 0.3);
            background: linear-gradient(135deg, #fff, var(--high-bg));
        }

        .result-medium {
            border-color: rgba(245, 158, 11, 0.3);
            background: linear-gradient(135deg, #fff, var(--medium-bg));
        }

        .result-low {
            border-color: rgba(16, 185, 129, 0.3);
            background: linear-gradient(135deg, #fff, var(--low-bg));
        }

        /* ── PAGE HEADER ─────────────────────────────────────── */
        .page-header {
            padding: 56px 0 36px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 48px;
        }

        .page-header .eyebrow {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
            display: inline-block;
            padding: 4px 10px;
            background: var(--accent-light);
            border-radius: 100px;
        }

        .page-header h1 {
            font-family: var(--font-head);
            font-size: clamp(1.9rem, 4vw, 2.8rem);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -1px;
            margin-bottom: 10px;
            color: var(--text);
        }

        .page-header p {
            color: var(--muted);
            max-width: 540px;
            font-size: 1rem;
        }

        /* ── LOADING SPINNER ─────────────────────────────────── */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── TOAST ───────────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 999;
            padding: 13px 18px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            box-shadow: var(--shadow-lg);
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        #toast.success {
            background: var(--low-bg);
            border: 1.5px solid rgba(16, 185, 129, 0.25);
            color: #065f46;
        }

        #toast.error {
            background: var(--high-bg);
            border: 1.5px solid rgba(239, 68, 68, 0.25);
            color: #991b1b;
        }

        /* ── TABLE ───────────────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 12px 16px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            text-align: left;
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 13px 16px;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            max-width: 320px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text2);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover td {
            background: var(--bg3);
        }

        /* ── FOOTER ──────────────────────────────────────────── */
        footer {
            border-top: 1px solid var(--border);
            padding: 28px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--muted2);
            font-size: 0.8rem;
            background: var(--bg2);
        }

        footer a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            color: var(--accent);
        }

        .footer-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text2);
            font-weight: 600;
            font-size: 0.875rem;
        }

        /* ── RESPONSIVE ──────────────────────────────────────── */
        @media (max-width: 768px) {
            nav {
                padding: 0 20px;
            }

            .nav-links {
                display: none;
            }

            .container {
                padding: 0 20px;
            }

            footer {
                flex-direction: column;
                gap: 10px;
                text-align: center;
                padding: 24px 20px;
            }
        }

        /* ── SCROLL REVEAL UTILITY ───────────────────────────── */
        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.55s ease, transform 0.55s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>

    <nav>
        <a href="/" class="nav-logo">
            <div class="logo-icon">P</div>
            Priority<span>AI</span>
        </a>
        <ul class="nav-links">
            <li><a href="/"        class="{% if request.endpoint == 'index'   %}active{% endif %}">Home</a></li>
            <li><a href="/single"  class="{% if request.endpoint == 'single'  %}active{% endif %}">Analyze</a></li>
            <li><a href="/batch"   class="{% if request.endpoint == 'batch'   %}active{% endif %}">Batch Mode</a></li>
            <li><a href="/finetune"class="{% if request.endpoint == 'finetune'%}active{% endif %}">Fine-Tune</a></li>
            <li><a href="/contact" class="{% if request.endpoint == 'contact' %}active{% endif %}">Contact</a></li>
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-brand">
            <div style="width:22px;height:22px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.7rem;font-weight:800;">P</div>
            © 2025 PriorityAI
        </div>
        <span>Powered by BERT · Flask · PyTorch</span>
    </footer>

    <div id="toast"></div>

    <script>
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `show ${type}`;
            setTimeout(() => t.className = '', 3200);
        }

        // Scroll reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    observer.unobserve(e.target);
                }
            });
        }, { threshold: 0.12 });

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
